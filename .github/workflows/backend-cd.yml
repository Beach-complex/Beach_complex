name: Backend CD

on:
  push:
    branches:
      - main
    paths:
      - src/**
      - build.gradle
      - settings.gradle
      - gradle/**
      - gradlew
      - gradlew.bat
      - Dockerfile
      - docker-compose.yml
      - src/main/resources/**
      - .github/workflows/backend-cd.yml
  workflow_dispatch:

concurrency:
  group: backend-cd-main
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    name: Build and Push Backend Image
    runs-on: ubuntu-latest
    outputs:
      image_repository: ${{ steps.image-meta.outputs.image_repository }}
      image_tag: ${{ steps.image-meta.outputs.image_tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Derive image metadata
        id: image-meta
        shell: bash
        run: |
          owner_lower=$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')
          repo_name="${GITHUB_REPOSITORY#*/}"
          repo_lower=$(echo "${repo_name}" | tr '[:upper:]' '[:lower:]')
          image_repository="${REGISTRY}/${owner_lower}/${repo_lower}-backend"

          echo "image_repository=${image_repository}" >> "${GITHUB_OUTPUT}"
          echo "image_tag=${GITHUB_SHA}" >> "${GITHUB_OUTPUT}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ steps.image-meta.outputs.image_repository }}:latest
            ${{ steps.image-meta.outputs.image_repository }}:${{ steps.image-meta.outputs.image_tag }}

  deploy-to-ec2:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-and-push
    env:
      IMAGE_REPOSITORY: ${{ needs.build-and-push.outputs.image_repository }}
      IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
      GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
      GHCR_READ_TOKEN: ${{ secrets.GHCR_READ_TOKEN }}
      EC2_DEPLOY_PATH: ${{ secrets.EC2_DEPLOY_PATH }}
      EC2_COMPOSE_FILE: ${{ secrets.EC2_COMPOSE_FILE }}
      EC2_ENV_FILE: ${{ secrets.EC2_ENV_FILE }}

    steps:
      - name: Deploy on EC2 over SSH
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT != '' && secrets.EC2_PORT || '22' }}
          envs: IMAGE_REPOSITORY,IMAGE_TAG,GHCR_USERNAME,GHCR_READ_TOKEN,EC2_DEPLOY_PATH,EC2_COMPOSE_FILE,EC2_ENV_FILE
          script: |
            set -eu

            cd "${EC2_DEPLOY_PATH}"
            echo "${GHCR_READ_TOKEN}" | docker login ghcr.io -u "${GHCR_USERNAME}" --password-stdin

            export APP_RUNTIME_ENV_FILE="${EC2_ENV_FILE}"

            docker compose -f "${EC2_COMPOSE_FILE}" pull app
            docker compose -f "${EC2_COMPOSE_FILE}" up -d app
            curl --fail --silent --show-error http://127.0.0.1:8080/actuator/health
